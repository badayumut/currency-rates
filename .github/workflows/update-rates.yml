name: Update Currency Rates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:       

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch rates and update JSON
        env:
          API_KEY: ${{ secrets.EXCHANGE }}
        run: |
          curl -s "https://v6.exchangerate-api.com/v6/$API_KEY/latest/USD" \
            | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          data = json.load(sys.stdin)
          output = {
              'base': 'USD',
              'updated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'rates': data['conversion_rates']
          }
          with open('rates.json', 'w') as f:
              json.dump(output, f, indent=2)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --cached --quiet || git commit -m "Update rates $(date -u +%Y-%m-%d)"
          git push
